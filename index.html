<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>60代男性の悩み診断AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>60代男性の悩み診断AI</h1>
  <p class="lead">20問診断＋自由相談</p>

  <div id="questions"></div>

  <button onclick="showResult()">診断する</button>

  <div id="result"></div>

  <h2>自由相談</h2>
  <textarea id="freeText" placeholder="例：最近、薄毛と体力低下が気になっています。定年後の生活も不安です。"></textarea>

  <button onclick="freeAdvice()">相談する</button>

  <div id="advice"></div>
</div>

<script src="script.js"></script>
</body>
</html>
